spring.application.name=asecontin-backend

# R2DBC PostgreSQL (usuario obligatorio; si no usas contraseña, déjala vacía)
# Schema imb: tablas en imb.usuario, imb.estado, etc.
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/asecontin_db?schema=imb
spring.r2dbc.username=postgres
spring.r2dbc.password=
spring.r2dbc.pool.initial-size=2
spring.r2dbc.pool.max-size=10

# SpringDoc OpenAPI (Swagger UI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT (en producción usar variables de entorno: JWT_SECRET, JWT_EXPIRATION_MS)
jwt.secret=asecontin-secret-key-cambiar-en-produccion-minimo-256-bits
jwt.expiration-ms=86400000

# Actuator: solo health para despliegue y load balancers
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Medios (imágenes/videos): carpeta en servidor y URL base para respuestas API
app.media.upload-dir=uploads
app.media.base-url=http://localhost:8080

# WhatsApp Cloud API (notificación de contacto al agente). Si access-token o phone-number-id están vacíos, no se envía.
# Dónde obtener los datos:
#   1. Entra en https://developers.facebook.com/ → Tu app → WhatsApp → Quick start (o Configuración).
#   2. access-token: en la misma sección aparece un "Token de acceso temporal" para pruebas; para producción crea un token permanente en Configuración de la app → Sistema de acceso empresarial / Access tokens.
#   3. phone-number-id: al agregar el producto WhatsApp y registrar un número de teléfono de negocio, en la API se muestra el "Phone number ID" (ID del número). También en: Configuración de WhatsApp → Números de teléfono.
# Número del destinatario (agente): solo dígitos, sin + ni espacios. Fácilmente modificable.
app.whatsapp.agent-phone=573108531903
app.whatsapp.access-token=
app.whatsapp.phone-number-id=
app.whatsapp.api-version=v21.0
